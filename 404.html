<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Claire Clavel, Psychologue Clinicienne</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <!-- Polices auto-hébergées via styles.css (RGPD — pas de Google Fonts CDN) -->
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--container-pad);
    }
    .error-inner {
      text-align: center;
      max-width: 540px;
    }
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: var(--clr-primary-light);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    .error-inner h1 {
      font-size: clamp(var(--text-2xl), 4vw, var(--text-3xl));
      margin-bottom: var(--space-4);
    }
    .error-inner p {
      color: var(--clr-text-muted);
      margin-bottom: var(--space-8);
      margin-inline: auto;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-4);
      justify-content: center;
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <header class="site-header" role="banner">
    <a href="/" class="logo" aria-label="Retour à l'accueil — Claire Clavel, Psychologue Clinicienne">
      <img src="images/Minimalist Logo for Psychologist Claire Clavel.svg"
           alt="Claire Clavel — Psychologue Clinicienne"
           class="logo-img" width="160" height="52">
    </a>
    <div class="header-inner">
      <nav class="primary-nav" aria-label="Navigation principale">
        <ul role="list">
          <li><a href="/#about">À propos</a></li>
          <li><a href="/#services">Consultations</a></li>
          <li><a href="/#contact">Contact</a></li>
        </ul>
        <a href="https://www.doctolib.fr/psychologue/seichamps/claire-clavel" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-lg">Prendre rendez-vous</a>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <div class="error-page">
      <div class="error-inner">
        <div class="error-code" aria-hidden="true">404</div>
        <h1>Page introuvable</h1>
        <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil ou consultez directement les informations du cabinet.</p>
        <div class="error-actions">
          <a href="/" class="btn btn-primary btn-lg">Retour à l'accueil</a>
          <a href="/#contact" class="btn btn-ghost btn-lg">Nous contacter</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-bottom">
      <div class="container">
        <p>&copy; 2026 Claire Clavel. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

</body>
</html>
